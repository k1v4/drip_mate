quiet: False
log-level: error
disable-version-string: True
with-expecter: True
dir: mocks/{{replaceAll (replaceAll .InterfaceDirRelative "internal" "internal_") "vendor/" ""}}
mockname: "{{ .InterfaceName | camelcase }}"
outpkg: mocks
disable-func-mocks: True

packages:
  notification_service/internal:
    config:
      all: true
      exclude: [
        "mocks",
        "pkg/tests",
      ]
      recursive: true
  notification_service/pkg:
    config:
      all: true
      exclude: [
        "mocks",
        "pkg/tests",
      ]
      recursive: true