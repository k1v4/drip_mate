version: '3.8'

services:
  drip-mate:
    build: .
    container_name: drip-mate
    volumes:
      - ./config/config.yaml:/config/config.yaml
    ports:
      - "8080:8080"  # 8080:8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:17-alpine
    container_name: postgres_container
    env_file:
      - .env
    volumes:
      - ./config/config.yaml:/config/config.yaml
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # 5432:5432
    healthcheck:
      test: [ "CMD-SHELL", "psql -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge