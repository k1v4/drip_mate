name: ci_cd

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: ['**']

permissions:
  contents: read
  pull-requests: read

env:
  IMAGE_NAME: k1vch/drip-mate

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.1

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3


  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.1

      - name: Compute coverpkgs
        id: coverpkgs
        run: |
          PKGS=$(go list ./... | grep -v mocks | grep -v postgres | grep -v app | grep -v docs | grep -v repository | grep -v config | grep -v cmd | paste -sd ',' -)
          echo "pkgs=$PKGS" >> "$GITHUB_OUTPUT"

      - name: Run tests with coverage
        run: |
          go test ./... \
            -coverpkg=${{ steps.coverpkgs.outputs.pkgs }} \
            -coverprofile=coverage.out \
            -v

      - name: Check coverage gate (>= 70%)
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${coverage}%"
          awk "BEGIN { exit !(${coverage} >= 70) }" || \
            (echo "Coverage ${coverage}% is below 70%" && exit 1)

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html


  build-and-push:
    name: build and push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin master

            docker compose pull
            docker compose up -d

            docker image prune -f
