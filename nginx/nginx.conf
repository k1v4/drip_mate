events {}

http {
    resolver 127.0.0.11 valid=10s;

    include mime.types;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    client_max_body_size 20M;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    upstream backend {
        zone backend 64k;
        server drip-mate:8080 resolve;
    }

    upstream frontend {
        zone frontend 64k;
        server drip-mate-frontend:80 resolve;
    }

    server {
        listen 80;

        location ~* \.(env|git|sql|bak|log)$ {
            access_log off;
            return 444;
        }

        location ~* /(phpunit|eval-stdin|sonicos|xmlrpc|wp-admin|phpmyadmin) {
            access_log off;
            return 444;
        }

        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://backend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location / {
            limit_req zone=general_limit burst=30 nodelay;

            proxy_pass http://frontend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        add_header X-XSS-Protection "1; mode=block" always;
    }
}