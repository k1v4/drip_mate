quiet: false
log-level: error
disable-version-string: true
with-expecter: true
disable-func-mocks: true
outpkg: mocks

packages:
  github.com/k1v4/drip_mate/file_upload_service/internal:
    config:
      all: true
      recursive: true
      exclude:
        - "mocks"
        - "pkg/tests"
      dir: file_upload_service/internal/mocks/{{replaceAll (replaceAll (replace .InterfaceDirRelative "file_upload_service/internal/" "" -1) "internal" "internal_") "vendor/" ""}}
      outpkg: mocks
      mockname: "{{ .InterfaceName | camelcase }}"
